name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '26'
          cache: maven

      - name: Run tests
        run: ./mvnw --batch-mode --no-transfer-progress test
