server:
  port: 8080

spring:
  application:
    name: spring-auction
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auction}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
  flyway:
    enabled: true
    validate-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      # Public endpoint (see SecurityConfig.adminChain) — status only, no internals leaked.
      show-details: never
  health:
    # Mail (SMTP/Mailpit) is an auxiliary notification channel; its outage shouldn't mark the app
    # DOWN and pull it out of the load balancer. Health reflects the app + database (db indicator).
    mail:
      enabled: false

app:
  ingestion:
    api-key: ${INGESTION_API_KEY:dev-ingestion-key}
  notification:
    base-url: ${APP_BASE_URL:http://localhost:8080}
    from-address: ${MAIL_FROM:auctions@spring-auction.local}
  admin:
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:dev-admin-password}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
