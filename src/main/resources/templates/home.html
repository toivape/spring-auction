<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome — Auction</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <main class="shell-main shell-main--center">
        <div class="entry-card panel">
            <h1 class="panel-title" th:text="'Welcome, ' + ${displayName}"></h1>
            <p class="entry-card-sub">You're signed in with <span th:text="${email}"></span></p>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-primary">Log out</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
