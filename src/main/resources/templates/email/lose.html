<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction ended</title>
</head>
<body>
<p>Hi <span th:text="${displayName}">Bidder</span>,</p>

<p>Thanks for taking part — better luck next time.</p>
</body>
</html>
