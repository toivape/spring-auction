<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auction manifest — Manifest</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <div th:replace="~{admin/fragments/shell :: header}"></div>
    <main class="shell-main">
        <div class="shell-container">
            <div class="panel">
                <div class="panel-header">
                    <h1 class="panel-title">Auction manifest</h1>
                    <span class="panel-count" th:text="${#lists.size(auctions)} + ' auction' + (${#lists.size(auctions)} == 1 ? '' : 's')"></span>
                </div>

                <p class="empty-state" th:if="${#lists.isEmpty(auctions)}">No auctions yet. Ingested items will appear here as drafts.</p>

                <div class="table-scroll" th:unless="${#lists.isEmpty(auctions)}">
                    <table class="manifest-table">
                        <thead>
                        <tr>
                            <th>Auction</th>
                            <th>Item ID</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Start price</th>
                            <th>Est. value</th>
                            <th>Window</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="auction : ${auctions}" th:with="status=${auction.lifecycleStatus.name()}">
                            <td class="cell-mono cell-muted" th:text="${auction.id}"></td>
                            <td class="cell-mono" th:text="${auction.itemId}"></td>
                            <td class="cell-title" th:text="${auction.title != null ? auction.title : '—'}"></td>
                            <td th:text="${auction.category}"></td>
                            <td>
                                <span class="stamp" th:classappend="'stamp--' + ${status.toLowerCase()}" th:text="${status}"></span>
                            </td>
                            <td class="cell-mono" th:text="${#numbers.formatDecimal(auction.startPrice, 1, 2)} + ' ' + ${auction.currency}"></td>
                            <td class="cell-mono" th:text="${#numbers.formatDecimal(auction.currentValue, 1, 2)} + ' ' + ${auction.currency}"></td>
                            <td class="cell-mono cell-muted"
                                th:text="${auction.startsAt != null and auction.endsAt != null}
                                          ? ${#temporals.format(auction.startsAt, 'dd.MM.yyyy HH:mm')} + ' → ' + ${#temporals.format(auction.endsAt, 'dd.MM.yyyy HH:mm')}
                                          : 'Not scheduled'"></td>
                            <td class="cell-actions">
                                <a th:if="${status == 'DRAFT'}"
                                   th:href="@{/admin/auctions/{id}/activate(id=${auction.id})}"
                                   class="btn-ghost btn-activate action-inline">Activate</a>
                                <form th:if="${status == 'ACTIVE' and auction.endsAt != null and auction.endsAt.isBefore(T(java.time.Instant).now())}"
                                      th:action="@{/admin/auctions/{id}/archive(id=${auction.id})}" method="post" class="action-inline">
                                    <button type="submit" class="btn-ghost btn-archive">Archive</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
