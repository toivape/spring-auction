<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auction manifest — Manifest</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <div th:replace="~{admin/fragments/shell :: header}"></div>
    <main class="shell-main">
        <div class="shell-container">
            <div class="panel">
                <div class="panel-header">
                    <h1 class="panel-title">Auction manifest</h1>
                    <span class="panel-count" th:text="${auctionPage.totalElements} + ' auction' + (${auctionPage.totalElements} == 1 ? '' : 's')"></span>
                </div>

                <form method="get" th:action="@{/admin/auctions}" class="toolbar">
                    <div class="toolbar-field">
                        <label for="status">Status</label>
                        <select id="status" name="status" onchange="this.form.submit()">
                            <option value="" th:selected="${selectedStatus == null}">All</option>
                            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${selectedStatus == s}"></option>
                        </select>
                    </div>
                    <div class="toolbar-field">
                        <label for="size">Page size</label>
                        <select id="size" name="size" onchange="this.form.submit()">
                            <option th:each="sz : ${pageSizes}" th:value="${sz}" th:text="${sz}" th:selected="${sz == selectedSize}"></option>
                        </select>
                    </div>
                    <noscript><button type="submit" class="btn-ghost">Apply</button></noscript>
                </form>

                <p class="empty-state" th:if="${#lists.isEmpty(auctions)}"
                   th:text="${selectedStatus != null} ? 'No ' + ${selectedStatus.name()} + ' auctions.' : 'No auctions yet. Ingested items will appear here as drafts.'"></p>

                <div class="table-scroll" th:unless="${#lists.isEmpty(auctions)}">
                    <table class="manifest-table">
                        <thead>
                        <tr>
                            <th>Auction</th>
                            <th>Item ID</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Start price</th>
                            <th>Est. value</th>
                            <th>Window</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="auction : ${auctions}" th:with="status=${auction.lifecycleStatus.name()}">
                            <td class="cell-mono cell-muted" th:text="${auction.id}"></td>
                            <td class="cell-mono" th:text="${auction.itemId}"></td>
                            <td class="cell-title" th:text="${auction.title != null ? auction.title : '—'}"></td>
                            <td th:text="${auction.category}"></td>
                            <td>
                                <span class="stamp" th:classappend="'stamp--' + ${status.toLowerCase()}" th:text="${status}"></span>
                            </td>
                            <td class="cell-mono" th:text="${#numbers.formatDecimal(auction.startPrice, 1, 2)} + ' ' + ${auction.currency}"></td>
                            <td class="cell-mono" th:text="${#numbers.formatDecimal(auction.currentValue, 1, 2)} + ' ' + ${auction.currency}"></td>
                            <td class="cell-mono cell-muted"
                                th:text="${auction.startsAt != null and auction.endsAt != null}
                                          ? ${#temporals.format(auction.startsAt, 'dd.MM.yyyy HH:mm')} + ' → ' + ${#temporals.format(auction.endsAt, 'dd.MM.yyyy HH:mm')}
                                          : 'Not scheduled'"></td>
                            <td class="cell-actions">
                                <a th:if="${status == 'DRAFT'}"
                                   th:href="@{/admin/auctions/{id}/activate(id=${auction.id})}"
                                   class="btn-ghost btn-activate action-inline">Activate</a>
                                <a th:if="${status == 'UNSOLD'}"
                                   th:href="@{/admin/auctions/{id}/extend(id=${auction.id})}"
                                   class="btn-ghost btn-activate action-inline">Extend</a>
                                <form th:if="${status == 'DRAFT' or status == 'ACTIVE'}"
                                      th:action="@{/admin/auctions/{id}/cancel(id=${auction.id})}" method="post" class="action-inline">
                                    <button type="submit" class="btn-ghost btn-archive">Cancel</button>
                                </form>
                                <form th:if="${status == 'UNSOLD' or status == 'CANCELLED'}"
                                      th:action="@{/admin/auctions/{id}/archive(id=${auction.id})}" method="post" class="action-inline">
                                    <button type="submit" class="btn-ghost btn-archive">Archive</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" th:if="${auctionPage.totalPages > 1}">
                    <a th:if="${auctionPage.hasPrevious()}"
                       th:href="@{/admin/auctions(status=${selectedStatus != null ? selectedStatus.name() : null}, size=${selectedSize}, page=${auctionPage.number - 1})}"
                       class="btn-ghost">&larr; Previous</a>
                    <span class="pagination-info">Page <span th:text="${auctionPage.number + 1}"></span> of <span th:text="${auctionPage.totalPages}"></span></span>
                    <a th:if="${auctionPage.hasNext()}"
                       th:href="@{/admin/auctions(status=${selectedStatus != null ? selectedStatus.name() : null}, size=${selectedSize}, page=${auctionPage.number + 1})}"
                       class="btn-ghost">Next &rarr;</a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
