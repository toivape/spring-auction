<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Manifest</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <div class="shell-main shell-main--center">
        <div class="entry-card panel">
            <h1 class="panel-title">Manifest</h1>
            <p class="entry-card-sub">Auction Admin — sign in to manage auctions</p>

            <p class="notice notice--error" th:if="${param.error}">Wrong email or password. Try again.</p>
            <p class="notice notice--info" th:if="${param.logout}">Signed out.</p>

            <form th:action="@{/admin/login}" method="post">
                <div class="field">
                    <label for="username">Email</label>
                    <input type="text" id="username" name="username" autocomplete="username">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Sign in</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
