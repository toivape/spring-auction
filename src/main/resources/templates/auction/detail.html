<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${(auction.title != null ? auction.title : auction.itemId)} + ' — Manifest'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <header class="shell-header">
        <span class="wordmark">Manifest <span class="wordmark-sub">— Auctions</span></span>
        <div class="who">
            <span class="who-email" th:text="${displayName}"></span>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Log out</button>
            </form>
        </div>
    </header>
    <main class="shell-main shell-main--center"
          th:with="isOpen=${auction.lifecycleStatus.name() == 'ACTIVE'
                            and auction.startsAt != null and auction.endsAt != null
                            and !T(java.time.Instant).now().isBefore(auction.startsAt)
                            and !T(java.time.Instant).now().isAfter(auction.endsAt)}">
        <div class="entry-card panel">
            <a class="back-link" th:href="@{/}">&larr; Back to auctions</a>
            <h1 class="panel-title" th:text="${auction.title != null ? auction.title : auction.itemId}"></h1>
            <p class="entry-card-sub" th:text="${auction.description}"></p>

            <p class="field-hint">
                Start price: <span th:text="${#numbers.formatDecimal(auction.startPrice, 1, 2)} + ' ' + ${auction.currency}"></span><br>
                Closes: <span th:text="${#temporals.format(auction.endsAt, 'dd.MM.yyyy HH:mm')}"></span>
            </p>

            <p class="notice notice--info" th:if="${myBid != null}">
                Your current bid: <span th:text="${#numbers.formatDecimal(myBid.amount, 1, 2)} + ' ' + ${auction.currency}"></span>
            </p>
            <p class="notice notice--info" th:if="${myBid == null and isOpen}">
                You haven't placed a bid yet.
            </p>
            <p class="notice notice--error" th:unless="${isOpen}">
                Bidding is not open for this auction.
            </p>

            <form th:if="${isOpen}" th:action="@{/auctions/{id}/bids(id=${auction.id})}" method="post">
                <div class="field">
                    <label for="amount">Your bid</label>
                    <input type="number" id="amount" name="amount" step="0.01"
                           th:min="${auction.startPrice}"
                           th:value="${myBid != null ? myBid.amount : auction.startPrice}" required>
                </div>
                <button type="submit" class="btn-primary" th:text="${myBid != null ? 'Update bid' : 'Place bid'}"></button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
