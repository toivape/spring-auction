<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auctions — Manifest</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/auction.css}">
</head>
<body>
<div class="shell">
    <header class="shell-header">
        <span class="wordmark">Manifest <span class="wordmark-sub">— Auctions</span></span>
        <div class="who" th:if="${authenticated}">
            <a class="link-button" th:href="@{/account}">My account</a>
            <span class="who-email" th:text="${displayName}"></span>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Log out</button>
            </form>
        </div>
        <a th:unless="${authenticated}" class="link-button" th:href="@{/oauth2/authorization/google}">Log in with Google</a>
    </header>
    <main class="shell-main">
        <div class="shell-container">
            <div class="auction-list-header">
                <h1 class="auction-list-title">Open for bidding</h1>
                <span class="auction-count" th:text="${#lists.size(auctions)} + ' auction' + (${#lists.size(auctions)} == 1 ? '' : 's')"></span>
            </div>

            <p class="empty-state" th:if="${#lists.isEmpty(auctions)}">No auctions are open for bidding right now. Check back soon.</p>

            <div class="auction-grid" th:unless="${#lists.isEmpty(auctions)}">
                <a class="auction-card" th:each="auction : ${auctions}" th:with="myBid=${myBids.get(auction.auctionRef)}"
                   th:href="@{/auctions/{id}(id=${auction.auctionRef})}">
                    <div class="asset-tag-row">
                        <span th:text="${auction.itemId}"></span>
                        <span class="category-chip" th:text="${auction.category}"></span>
                    </div>
                    <div class="tag-perforation"></div>
                    <h2 class="auction-card-title" th:text="${auction.title != null ? auction.title : auction.itemId}"></h2>
                    <p class="auction-card-price">
                        from <span th:text="${#numbers.formatDecimal(auction.startPrice, 1, 2)} + ' ' + ${auction.currency}"></span>
                    </p>
                    <div class="auction-card-foot">
                        <div class="dispatch">
                            <span class="dispatch-label">Closes</span>
                            <span class="dispatch-clock" th:attr="data-ends-at=${auction.endsAt}">—</span>
                        </div>
                        <span class="sealed-badge" th:if="${myBid != null}"
                              th:text="'Your bid: ' + ${#numbers.formatDecimal(myBid.amount, 1, 2)} + ' ' + ${auction.currency}"></span>
                    </div>
                </a>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/dispatch-clock.js}"></script>
</body>
</html>
