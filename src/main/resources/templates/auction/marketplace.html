<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auctions — Manifest</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <header class="shell-header">
        <span class="wordmark">Manifest <span class="wordmark-sub">— Auctions</span></span>
        <div class="who">
            <span class="who-email" th:text="${displayName}"></span>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Log out</button>
            </form>
        </div>
    </header>
    <main class="shell-main">
        <div class="shell-container">
            <div class="panel">
                <div class="panel-header">
                    <h1 class="panel-title">Active auctions</h1>
                    <span class="panel-count" th:text="${#lists.size(auctions)} + ' auction' + (${#lists.size(auctions)} == 1 ? '' : 's')"></span>
                </div>

                <p class="empty-state" th:if="${#lists.isEmpty(auctions)}">No active auctions right now. Check back soon.</p>

                <div class="table-scroll" th:unless="${#lists.isEmpty(auctions)}">
                    <table class="manifest-table">
                        <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Start price</th>
                            <th>Your bid</th>
                            <th>Closes</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="auction : ${auctions}" th:with="myBid=${myBids.get(auction.id)}">
                            <td class="cell-title" th:text="${auction.title != null ? auction.title : auction.itemId}"></td>
                            <td th:text="${auction.category}"></td>
                            <td class="cell-mono" th:text="${#numbers.formatDecimal(auction.startPrice, 1, 2)} + ' ' + ${auction.currency}"></td>
                            <td class="cell-mono" th:text="${myBid != null ? #numbers.formatDecimal(myBid.amount, 1, 2) + ' ' + auction.currency : '—'}"></td>
                            <td class="cell-mono cell-muted" th:text="${#temporals.format(auction.endsAt, 'dd.MM.yyyy HH:mm')}"></td>
                            <td class="cell-actions">
                                <a th:href="@{/auctions/{id}(id=${auction.id})}" class="btn-ghost action-inline">View &amp; bid</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
