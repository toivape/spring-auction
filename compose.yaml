services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=auction'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'
  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '1025:1025'   # SMTP endpoint the app sends to (spring.mail.port)
      - '8025:8025'   # web inbox — open http://localhost:8025
